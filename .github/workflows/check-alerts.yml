name: Check alerts

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 * * * *"
  # Disabled temporarily until ALERTS_SCAN_URL and ALERTS_CRON_SECRET
  # secrets are configured (see repo/Vercel settings).

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger alerts scan
        run: |
          curl -sf -X POST "${{ secrets.ALERTS_SCAN_URL }}" \
            -H "Authorization: Bearer ${{ secrets.ALERTS_CRON_SECRET }}"
